# Source https://github.com/canonical/kubeflow-notebooks/blob/v1.11.0-rc.1-ambient/components/notebook-controller/Dockerfile
name: notebook-controller
summary: An image for Jupyter notebook controller
description: |
  This image is used as part of the Charmed Kubeflow product. The controller allows users to
  create a custom resource "Notebook" (jupyter notebook).
version: 1.11.0-rc.1-ambient
license: Apache-2.0
base: ubuntu@24.04
services:
  jupyter-controller:
    override: replace
    summary: "notebook-controller service"
    startup: enabled
    command: "/manager"
platforms:
  amd64:
run-user: _daemon_

parts:
  security-team-requirement:
    plugin: nil
    override-build: |
      mkdir -p ${CRAFT_PART_INSTALL}/usr/share/rocks
      (echo "# os-release" && cat /etc/os-release && echo "# dpkg-query" && \
       dpkg-query -f '${db:Status-Abbrev},${binary:Package},${Version},${source:Package},${Source:Version}\n' -W) > \
       ${CRAFT_PART_INSTALL}/usr/share/rocks/dpkg.query

  notebook-controller:
    plugin: go
    source: https://github.com/canonical/kubeflow-notebooks
    source-type: git
    source-tag: v1.11.0-rc.1-ambient
    source-depth: 1
    source-subdir: components/notebook-controller
    build-snaps:
      - go/1.24/stable
    build-packages:
      - apt
      - bash
    build-environment:
      - CGO_ENABLED: "0"
      - GOOS: linux
    stage-packages:
      - bash
    override-build: |
      set -e
      cd $CRAFT_PART_SRC_WORK

      for m in $(go list -m all | awk '/^github.com\/hashicorp\// {print $1 "@" $2}'); do
        go mod download "$m"
      done

      # build
      go build -a -o manager main.go

      # install build artifacts
      mkdir -p $CRAFT_PART_INSTALL/
      cp manager $CRAFT_PART_INSTALL/
      mkdir -p $CRAFT_PART_INSTALL/third_party
      cp third_party/license.txt $CRAFT_PART_INSTALL/third_party/license.txt
      cp -r /root/go/pkg/mod/github.com/hashicorp $CRAFT_PART_INSTALL/third_party/hashicorp
